server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/art_print_point
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# Logging
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: DEBUG